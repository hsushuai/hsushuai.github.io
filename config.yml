baseURL: "https://hsushuai.github.io/"
languageCode: en-us
title: Hsu's blog
theme: PaperMod

enableRobotsTXT: true
enableInlineShortcodes: true
enableEmoji: true
buildDrafts: false
buildFuture: false
buildExpired: false

googleAnalytics: UA-123-45

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: ExampleSite
  description: "ExampleSite description"
  keywords: [Blog, Portfolio, PaperMod]
  author: Alexander
  # author: ["Me", "You"] # multiple authors
  images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowFullTextinRSS: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  label:
    text: "Home"
  homeInfoParams:
    Title: "Hi there \U0001F44B"
    Content: |
        🎉 Welcome to my blog!

        Here are some solutions 👨‍💻 to the problems that drive me crazy in my work and study.
        If you have any questions, please feel free to contact me via [email](mailto:hsushaui@outlook.com).

        This page is based on [Hugo](https://gohugo.io/) theme [PaperMod](https://github.com/adityatelange/hugo-PaperMod).

        Now, everything is building 🏗️ at a *surprise* pace.

  socialIcons:
    - name: email
      url: "mailto:hsushaui@outlook.com"
    - name: github
      url: "https://github.com/hsushuai"
    - name: bilibili
      url: "https://space.bilibili.com/505443787"
    - name: rss
      url: "index.xml"

  assets:
    favicon: "logo.ico"

  analytics:
    google:
      SiteVerificationTag: "XYZabc"
    bing:
      SiteVerificationTag: "XYZabc"
    yandex:
      SiteVerificationTag: "XYZabc"

menu:
  main:
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: about
      name: About
      url: about
      weight: 30

# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai